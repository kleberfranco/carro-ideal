{{ define "content" }}
<div class="auth-wrap">
    <div class="auth-card">
        <p class="eyebrow text-center">Comece agora</p>
        <h1 class="h4 text-center mb-4">Criar conta</h1>

        <div id="register-error" class="alert alert-danger d-none mb-3" role="alert"></div>

        <form id="register-form">
            <div class="mb-3">
                <label class="form-label">Nome completo</label>
                <input type="text" name="name" class="form-control" placeholder="Seu nome" required>
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirmar senha</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repita a senha" required>
                <div class="invalid-feedback"></div>
            </div>
            <button type="submit" id="register-submit" class="btn btn-primary btn-lg w-100">Criar conta</button>
        </form>

        <div class="auth-footer">
            Já tem conta? <a href="/login">Entrar</a>
        </div>
    </div>
</div>

<script src="/static/js/web/register.js"></script>
{{ end }}
