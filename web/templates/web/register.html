{{ define "content" }}
<h1 class="mb-4 text-center">Criar conta</h1>

<div id="register-error" class="mb-3"></div>

<form id="register-form" class="row g-3">

    <div class="col-12">
        <input type="text" name="name" class="form-control" placeholder="Nome completo">
        <div class="invalid-feedback"></div>
    </div>

    <div class="col-12">
        <input type="email" name="email" class="form-control" placeholder="E-mail">
        <div class="invalid-feedback"></div>
    </div>

    <div class="col-12">
        <input type="password" name="password" class="form-control" placeholder="Senha">
        <div class="invalid-feedback"></div>
    </div>

    <div class="col-12">
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirmar senha">
        <div class="invalid-feedback"></div>
    </div>

    <button type="submit" id="register-submit" class="btn btn-primary w-100 mt-3">
        Cadastrar
    </button>
</form>

<a href="/login" class="d-block mt-3 text-center">Já tenho conta</a>

<script src="/static/js/web/register.js"></script>
{{ end }}
