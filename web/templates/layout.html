<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >

    <link rel="stylesheet" href="/static/css/style.css">


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container">
        <a class="navbar-brand" href="/">Carro Ideal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Alternar navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                {{ if .IsLoggedIn }}
                <li class="nav-item">
                    <a class="nav-link" href="/recommend">Recomendações</a>
                </li>
                {{ if .IsAdmin }}
                <li class="nav-item">
                    <a class="nav-link" href="/admin">Administração</a>
                </li>
                {{ else }}
                <li class="nav-item d-none" id="admin-nav-item">
                    <a class="nav-link" href="/admin">Administração</a>
                </li>
                {{ end }}
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Sair</a>
                </li>
                {{ else }}
                <li class="nav-item">
                    <a class="nav-link" href="/login">Acessar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register">Criar conta</a>
                </li>
                {{ end }}
                <li class="nav-item ms-lg-2">
                    <button class="btn btn-sm btn-outline-secondary mt-1" id="theme-toggle"
                            type="button" aria-pressed="false">Tema escuro</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    {{ template "content" . }}
</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
></script>
<script src="/static/js/session.js"></script>
</body>

</html>
