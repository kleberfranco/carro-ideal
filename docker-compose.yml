services:
  app:
    build:
      context: .
    container_name: carro-ideal-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: carro_ideal
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 5
      SESSION_SECRET: change-me
      LOG_LEVEL: debug

  db:
    image: postgres:15
    container_name: carro-ideal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carro_ideal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
